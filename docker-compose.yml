#version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: rss3_db
    restart: always
    env_file: .env
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
    #ports:
    #  - "3306:3306"
    expose:
      - "3306"
    volumes:
      - db_data:/var/lib/mysql

  web:
    build: .
    container_name: rss3_web
    restart: always
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db

volumes:
  db_data: