{% extends "home/base.html" %}

{% block content %}
  {% if form.errors %}
    <p class="text-danger">Dein Benutzername und Passwort stimmen nicht überein. Bitte versuche es erneut.</p>
  {% endif %}

  <form method="post" action="{% url 'login' %}">
    {% csrf_token %}
    <table class="table">
      <tr>
        <td>{{ form.username.label_tag }}</td>
        <td>{{ form.username }}</td>
      </tr>
      <tr>
        <td>{{ form.password.label_tag }}</td>
        <td>{{ form.password }}</td>
      </tr>
    </table>
    
    <input type="submit" class="btn btn-primary" value="Einloggen" />
    <input type="hidden" name="next" value="{{ next }}" />
  </form>
{% endblock %}
